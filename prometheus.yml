global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'helixd'
    static_configs:
      - targets: ['helixd:9090']
    metrics_path: /metrics

  - job_name: 'helix-gateway'
    static_configs:
      - targets: ['helix-gateway:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
